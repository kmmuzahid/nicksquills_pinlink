name: pinlink
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  core_kit:
    path: /Users/username/Documents/km muzahid/flutter_core_kit
  # core_kit:
  #   git:
  #     url: https://github.com/kmmuzahid/flutter_core_kit.git
  #     ref: 1.1.33

  auto_route:
  flutter_bloc:
  get_it:
  flutter_secure_storage:
  equatable:
  pin_code_fields:
  video_player: ^2.11.0
  video_thumbnail:
  #map
  google_maps_flutter:  
  flutter_polyline_points:  
  geolocator:
  widget_to_marker:
  json_annotation:
  json_serializable:
  socket_io_client: 
  flutter_local_notifications: ^21.0.0
    # intl_utils:   # to generate from arb 


dev_dependencies:
  flutter_test:
    sdk: flutter

  # core_kit_lints:
  #   path: ../core_kit/tools/custom_lint

  flutter_lints:
  build_runner:
  auto_route_generator:
  flutter_launcher_icons:
  flutter_gen_runner:
  change_app_package_name: ^1.5.0
  rename_app: ^1.6.5

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png" # your custom icon path

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
    - assets/navigators/
    - assets/setting/

  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Italic.ttf
          style: italic
        - asset: assets/fonts/PlayfairDisplay-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlayfairDisplay-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlayfairDisplay-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlayfairDisplay-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/PlayfairDisplay-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/PlayfairDisplay-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/PlayfairDisplay-Black.ttf
          weight: 900
        - asset: assets/fonts/PlayfairDisplay-BlackItalic.ttf
          weight: 900
          style: italic
